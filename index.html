<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Create Coach</title>

  <style>
    :root{
      --panel:rgba(17,17,17,.88);
      --border:rgba(255,255,255,.10);
      --text:#fff;
      --muted:rgba(255,255,255,.62);

      --accent:#7B2EFF;
      --accent2:#B266FF;
      --clubGlow: rgba(123,46,255,.18);

      --ok:#19c37d;
      --danger:#ff4d4f;
      --radius:22px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:transparent;
      color:var(--text);
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
    }

    .stage{
      min-height:100vh;
      padding:22px;
      background:
        radial-gradient(1000px 600px at 20% -10%, rgba(255,255,255,.05), transparent 60%),
        linear-gradient(180deg,#000 0%,#050505 100%);
      position:relative;
      overflow:hidden;
    }

    .stage::before{
      content:"";
      position:absolute;
      inset:-40% -20%;
      transform:rotate(-14deg);
      background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.05), rgba(255,255,255,0));
      opacity:.18;
      pointer-events:none;
    }

    .stage::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(800px 520px at 80% 18%, var(--clubGlow), transparent 62%);
      opacity:.9;
      pointer-events:none;
      animation:glowPulse 2.8s ease-in-out infinite;
    }

    @keyframes glowPulse{
      0%{opacity:.55}
      50%{opacity:1}
      100%{opacity:.55}
    }

    .wrap{
      max-width:1120px;
      margin:0 auto;
      position:relative;
      z-index:2;
    }

    .topBar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }

    .title{
      font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
      font-size:56px;
      text-transform:uppercase;
      letter-spacing:1px;
      line-height:1;
      position:relative;
      padding-bottom:10px;
      margin:0;
    }

    .title::after{
      content:"";
      position:absolute;
      left:0;
      bottom:0;
      height:6px;
      width:100%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--accent), transparent);
      animation:underlineSweep 1.8s linear infinite;
    }

    @keyframes underlineSweep{
      0%{filter:brightness(1); transform:translateX(-2px)}
      50%{filter:brightness(1.12); transform:translateX(2px)}
      100%{filter:brightness(1); transform:translateX(-2px)}
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      margin-top:8px;
      max-width:720px;
      line-height:1.45;
    }

    .pillRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
      align-items:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      font-weight:900;
      letter-spacing:.6px;
      text-transform:uppercase;
    }

    .pill strong{
      font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
      font-size:18px;
      letter-spacing:.8px;
      font-weight:400;
    }

    .glow{
      box-shadow:0 0 0 1px rgba(255,255,255,.04), 0 0 32px var(--clubGlow);
    }

    .topPills{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:16px;
      margin-bottom:14px;
    }

    .ctaRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    .btn{
      appearance:none;
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:16px;
      padding:13px 16px;
      font-weight:900;
      letter-spacing:.7px;
      text-transform:uppercase;
      color:#fff;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.14);
      position:relative;
      overflow:hidden;
      transition:.15s ease;
      min-height:48px;
    }

    .btn::after{
      content:"";
      position:absolute;
      left:12px;
      right:12px;
      bottom:9px;
      height:4px;
      border-radius:999px;
      background:linear-gradient(90deg, var(--accent), transparent);
      transform:scaleX(0);
      transform-origin:left;
      transition:.18s ease;
      opacity:.95;
    }

    .btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.08);
      border-color:rgba(255,255,255,.18);
      box-shadow:0 0 28px var(--clubGlow);
    }

    .btn:hover::after{
      transform:scaleX(1);
    }

    .btn.primary{
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      box-shadow:0 0 0 1px rgba(255,255,255,.04), 0 0 28px var(--clubGlow);
    }

    .panel{
      width:100%;
      background:rgba(17,17,17,.88);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:14px;
      position:relative;
      overflow:hidden;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:-60% -20%;
      transform:rotate(-12deg);
      background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.05), rgba(255,255,255,0));
      opacity:.22;
      pointer-events:none;
    }

    .panelInner{
      position:relative;
      z-index:2;
    }

    .h2{
      font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;
      font-size:28px;
      text-transform:uppercase;
      letter-spacing:.8px;
      margin:0;
      padding-bottom:8px;
      position:relative;
      line-height:1;
    }

    .h2::after{
      content:"";
      position:absolute;
      left:0;
      bottom:0;
      height:4px;
      width:100%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--accent), transparent);
      transform:scaleX(.35);
      transform-origin:left;
      transition:.18s ease;
      opacity:.95;
    }

    .panel:hover .h2::after{
      transform:scaleX(1);
    }

    .tiny{
      color:rgba(255,255,255,.62);
      font-size:12px;
      margin-top:10px;
      line-height:1.45;
    }

    .formGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:14px;
    }

    @media (max-width: 620px){
      .formGrid{grid-template-columns:1fr}
    }

    .field{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      border-radius:16px;
      padding:12px;
      transition:.16s ease;
    }

    .field:hover{
      border-color:rgba(255,255,255,.16);
      background:rgba(255,255,255,.05);
      box-shadow:0 0 22px var(--clubGlow);
      transform:translateY(-1px);
    }

    .field.full{
      grid-column:1 / -1;
    }

    .label{
      color:rgba(255,255,255,.62);
      font-size:11px;
      font-weight:900;
      letter-spacing:.9px;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .input,
    .select{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      color:#fff;
      font-size:15px;
      font-weight:700;
      font-family:Arial,sans-serif;
    }

    .input::placeholder{
      color:rgba(255,255,255,.38);
      font-weight:700;
    }

    .select{
      min-height:150px;
    }

    .select option{
      background:#111;
      color:#fff;
      padding:8px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .statusCard{
      margin-top:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      border-radius:16px;
      padding:12px;
      min-height:58px;
      display:flex;
      align-items:center;
      box-shadow:0 0 0 1px rgba(255,255,255,.03);
    }

    .statusText{
      font-size:14px;
      line-height:1.45;
      color:rgba(255,255,255,.92);
      word-break:break-word;
    }

    .statusText.ok{ color:#dff7ea; }
    .statusText.err{ color:#ffe2e2; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="wrap">

      <div class="topBar">
        <div>
          <h1 class="title">Create Coach</h1>
          <div class="sub" id="subtitle">
            Create a coach profile, assign teams, and send their password setup email.
          </div>
        </div>

        <div class="ctaRow">
          <button class="btn" id="showAllCoachesBtn" type="button">Show All Coaches</button>
        </div>
      </div>

      <div class="topPills">
        <div class="pillRow">
          <div class="pill glow"><strong id="clubNamePill">Club</strong></div>
        </div>

        <div class="pill glow"><strong>ALL IN ONE</strong></div>
      </div>

      <div class="panel">
        <div class="panelInner">
          <div class="h2">Coach Details</div>
          <div class="tiny">
            Fill in the coach information below and assign one or more teams.
          </div>

          <div class="formGrid">
            <div class="field">
              <div class="label">First Name</div>
              <input class="input" id="coachFirstNameInput" type="text" placeholder="Enter first name"/>
            </div>

            <div class="field">
              <div class="label">Last Name</div>
              <input class="input" id="coachLastNameInput" type="text" placeholder="Enter last name"/>
            </div>

            <div class="field">
              <div class="label">Email</div>
              <input class="input" id="coachEmailInput" type="email" placeholder="coach@email.com"/>
            </div>

            <div class="field">
              <div class="label">Phone</div>
              <input class="input" id="coachPhoneInput" type="text" placeholder="Enter phone number"/>
            </div>

            <div class="field full">
              <div class="label">Assign Teams</div>
              <select class="select" id="teamsTags" multiple></select>
            </div>
          </div>

          <div class="actions">
            <button class="btn primary" id="createCoachBtn" type="button">Create Coach</button>
          </div>

          <div class="statusCard">
            <div class="statusText" id="statusText">Waiting for club data…</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const $clubNamePill = document.getElementById("clubNamePill");
    const $subtitle = document.getElementById("subtitle");
    const $statusText = document.getElementById("statusText");

    const $coachEmailInput = document.getElementById("coachEmailInput");
    const $coachFirstNameInput = document.getElementById("coachFirstNameInput");
    const $coachLastNameInput = document.getElementById("coachLastNameInput");
    const $coachPhoneInput = document.getElementById("coachPhoneInput");
    const $teamsTags = document.getElementById("teamsTags");

    const $createCoachBtn = document.getElementById("createCoachBtn");
    const $showAllCoachesBtn = document.getElementById("showAllCoachesBtn");

    let state = {
      clubSlug: "",
      clubName: "",
      showAllCoachesUrl: "",
      teams: []
    };

    function safe(v){
      return String(v ?? "").replace(/[<>]/g, "");
    }

    function norm(v){
      return String(v || "").trim();
    }

    function lower(v){
      return String(v || "").trim().toLowerCase();
    }

    function getThemeFromClubSlug(clubSlug){
      const slug = lower(clubSlug);

      const map = {
        mds: {
          accent: "#7B2EFF",
          accent2: "#B266FF",
          glow: "rgba(123,46,255,.18)"
        },
        cherrybrook: {
          accent: "#C8102E",
          accent2: "#FF4B5C",
          glow: "rgba(200,16,46,.20)"
        },
        rumson: {
          accent: "#F5F5F5",
          accent2: "#CFCFCF",
          glow: "rgba(255,255,255,.16)"
        },
        monmouth: {
          accent: "#00E5FF",
          accent2: "#00A3FF",
          glow: "rgba(0,229,255,.18)"
        },
        default: {
          accent: "#7B2EFF",
          accent2: "#B266FF",
          glow: "rgba(123,46,255,.18)"
        }
      };

      return map[slug] || map.default;
    }

    function applyThemeFromClubSlug(clubSlug){
      const theme = getThemeFromClubSlug(clubSlug);
      const r = document.documentElement.style;
      r.setProperty("--accent", theme.accent);
      r.setProperty("--accent2", theme.accent2);
      r.setProperty("--clubGlow", theme.glow);
    }

    function setStatus(msg, type){
      $statusText.textContent = String(msg || "");
      $statusText.classList.remove("ok", "err");

      if (type === "ok") $statusText.classList.add("ok");
      if (type === "err") $statusText.classList.add("err");
    }

    function renderTeams(teams){
      const arr = Array.isArray(teams) ? teams : [];
      $teamsTags.innerHTML = "";

      arr.forEach(team => {
        const opt = document.createElement("option");
        opt.value = team.value || "";
        opt.textContent = team.label || "(Unnamed)";
        $teamsTags.appendChild(opt);
      });
    }

    function getSelectedTeamIds(){
      return Array.from($teamsTags.selectedOptions || [])
        .map(opt => opt.value)
        .filter(Boolean);
    }

    function post(type, payload = {}){
      try{
        window.parent.postMessage({ type, ...payload }, "*");
      }catch(_){}
    }

    $createCoachBtn.addEventListener("click", () => {
      const payload = {
        clubSlug: state.clubSlug,
        email: lower($coachEmailInput.value),
        firstName: norm($coachFirstNameInput.value),
        lastName: norm($coachLastNameInput.value),
        phone: norm($coachPhoneInput.value),
        teamIds: getSelectedTeamIds()
      };

      setStatus("Creating coach...", "");
      post("CREATE_COACH", payload);
    });

    $showAllCoachesBtn.addEventListener("click", () => {
      post("SHOW_ALL_COACHES", {
        clubSlug: state.clubSlug,
        url: state.showAllCoachesUrl || ""
      });
    });

    window.addEventListener("message", (ev) => {
      const data = ev.data;
      if (!data) return;

      if (data.type === "INIT_CREATE_COACH_PAGE"){
        state.clubSlug = safe(data.clubSlug || "");
        state.clubName = safe(data.clubName || data.clubSlug || "Club");
        state.showAllCoachesUrl = safe(data.showAllCoachesUrl || "");
        state.teams = Array.isArray(data.teams) ? data.teams : [];

        applyThemeFromClubSlug(state.clubSlug);

        $clubNamePill.textContent = state.clubName || "Club";

        $subtitle.textContent = state.clubSlug
          ? `Create a coach for ${state.clubName || state.clubSlug} and assign them to one or more teams.`
          : "Create a coach profile, assign teams, and send their password setup email.";

        renderTeams(state.teams);
        setStatus(state.clubSlug ? "Page ready." : "Missing clubSlug.", state.clubSlug ? "" : "err");
        return;
      }

      if (data.type === "CREATE_COACH_STATUS"){
        setStatus(data.message || "Working...", data.status || "");
        return;
      }

      if (data.type === "CREATE_COACH_SUCCESS"){
        setStatus(data.message || "Coach created. Password email sent.", "ok");

        if (data.clearForm !== false){
          $coachEmailInput.value = "";
          $coachFirstNameInput.value = "";
          $coachLastNameInput.value = "";
          $coachPhoneInput.value = "";
          Array.from($teamsTags.options).forEach(opt => { opt.selected = false; });
        }
        return;
      }

      if (data.type === "CREATE_COACH_ERROR"){
        setStatus(data.message || "Invite failed.", "err");
        return;
      }
    });

    try{
      window.parent.postMessage({ type:"IFRAME_READY", view:"createCoach" }, "*");
    }catch(_){}
  </script>
</body>
</html>
